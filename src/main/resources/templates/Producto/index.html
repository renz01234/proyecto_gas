<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Gestión de Productos</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<script>
	function confirmarEliminacion() {
		return confirm("¿Desea eliminar este producto?");
	}
</script>

</head>

<body class="container mt-4">

	<h2 class="text-center">Gestión de Productos</h2>

	<!-- MENSAJE -->
	<div th:if="${msg}" class="alert alert-success">
		<span th:text="${msg}"></span>
	</div>

	<!-- BUSCADOR -->
	<form class="mb-3" th:action="@{/producto/buscar}" method="get">
		<input type="text" name="nombre" class="form-control w-25 d-inline"
			placeholder="Buscar marca">
		<button class="btn btn-info">Buscar</button>
	</form>

	<!-- BOTÓN INGRESAR -->
	<a class="btn btn-primary mb-3" th:href="@{/producto/ingresar}"> +
		Nuevo Producto </a>

	<!-- TABLA -->
	<table class="table table-bordered table-hover">

		<thead class="table-dark">
			<tr>
				<th>ID</th>
				<th>Marca</th>
				<th>Precio</th>
				<th>Tamaño</th>
				<th>Acciones</th>
			</tr>
		</thead>

		<tbody>

			<tr th:each="p : ${lista_producto}">
				<td th:text="${p.codProducto}"></td>
				<td th:text="${p.nomMarca}"></td>
				<td th:text="${p.precio}"></td>
				<td th:text="${p.tamano}"></td>

				<td><a class="btn btn-warning btn-sm"
					th:href="@{'/producto/modificar/' + ${p.codProducto}}"> Editar
				</a> <a class="btn btn-danger btn-sm"
					th:href="@{'/producto/eliminar/' + ${p.codProducto}}"
					onclick="return confirmarEliminacion();"> Eliminar </a></td>
			</tr>

		</tbody>

	</table>

</body>
</html>
