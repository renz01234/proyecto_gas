<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<title>Registro de Cliente</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

</head>

<body class="bg-light">

	<div class="container">

		<div class="row justify-content-center mt-4">

			<div class="col-md-6">

				<div class="card shadow">

					<div class="card-header text-center">

						<h3>Crear Cuenta</h3>

					</div>

					<div class="card-body">

						<form th:action="@{/registro}" th:object="${usuario}"
							method="post">

							<div class="mb-3">

								<label class="form-label"> Nombre </label> <input type="text"
									class="form-control" th:field="*{nombre}" required>

							</div>

							<div class="mb-3">

								<label class="form-label"> Apellido </label> <input type="text"
									class="form-control" th:field="*{apellido}" required>

							</div>

							<div class="mb-3">

								<label class="form-label"> Correo Electrónico </label> <input
									type="email" class="form-control" th:field="*{email}" required>

							</div>

							<div class="mb-3">

								<label class="form-label"> Contraseña </label> <input
									type="password" class="form-control" th:field="*{password}"
									required>

							</div>

							<div class="mb-3">

								<label class="form-label"> Celular </label> <input type="text"
									class="form-control" name="celular" required>

							</div>

							<div class="mb-3">

								<label class="form-label"> Dirección </label> <input type="text"
									class="form-control" name="direccion" required>

							</div>

							<div class="d-flex justify-content-between">

								<a class="btn btn-secondary" th:href="@{/}"> Regresar </a>

								<button class="btn btn-success">Crear Cuenta</button>

							</div>

						</form>

					</div>

				</div>

			</div>

		</div>

	</div>

</body>
</html>
