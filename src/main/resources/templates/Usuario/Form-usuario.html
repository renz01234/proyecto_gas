<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Formulario Usuario</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
	rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/sidebar.css}">

</head>

<body>

	<div th:replace="~{fragments/sidebar :: sidebar}"></div>

	<div id="contenido" class="container mt-4">

		<h2 class="text-center mb-4">Formulario de Usuario</h2>

		<div class="card shadow p-4">

			<form th:action="@{/usuario/procesar}" th:object="${usuario}"
				method="post">

				<input type="hidden" th:field="*{codUsuario}" />

				<div class="mb-3">

					<label class="form-label"> Rol </label> <select class="form-select"
						th:field="*{rol.codRol}">

						<option value="1">Administrador</option>

						<option value="2">Repartidor</option>

						<option value="3">Cliente</option>

					</select>

				</div>

				<div class="mb-3">

					<label class="form-label"> Nombre </label> <input type="text"
						class="form-control" th:field="*{nombre}" required>

				</div>

				<div class="mb-3">

					<label class="form-label"> Apellido </label> <input type="text"
						class="form-control" th:field="*{apellido}" required>

				</div>

				<div class="mb-3">

					<label class="form-label"> Correo Electrónico </label> <input
						type="email" class="form-control" th:field="*{email}" required>

				</div>

				<div class="mb-3">

					<label class="form-label"> Contraseña </label> <input
						type="password" class="form-control" th:field="*{password}"
						required>

				</div>

				<div class="mb-3">

					<label class="form-label"> Activo </label> <select
						class="form-select" th:field="*{activo}">

						<option value="true">Sí</option>

						<option value="false">No</option>

					</select>

				</div>

				<div class="d-flex justify-content-between">

					<a class="btn btn-secondary" href="javascript:history.back()">

						Regresar </a>

					<button class="btn btn-success" type="submit">Guardar</button>

				</div>

			</form>

		</div>

	</div>

	<script th:src="@{/js/sidebar.js}"></script>

</body>

</html>
