<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<title>Gestión de Usuarios</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
	rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/sidebar.css}">

<script>
	function confirmarEliminacion() {

		return confirm("¿Desea eliminar este usuario?");

	}
</script>

</head>

<body>

	<div th:replace="~{fragments/sidebar :: sidebar}"></div>

	<div id="contenido" class="container mt-4">

		<h2 class="text-center">Gestión de Usuarios</h2>

		<div th:if="${msg}" class="alert alert-success">

			<span th:text="${msg}"></span>

		</div>

		<form class="mb-3" th:action="@{/usuario/buscar}" method="get">

			<input type="text" name="nombre" class="form-control w-25 d-inline"
				placeholder="Buscar usuario">

			<button class="btn btn-info">Buscar</button>

		</form>

		<a class="btn btn-primary mb-3" th:href="@{/usuario/ingresar}"> +
			Nuevo Usuario </a>

		<table class="table table-bordered table-hover">

			<thead class="table-dark">

				<tr>

					<th>ID</th>
					<th>Rol</th>
					<th>Nombre</th>
					<th>Apellido</th>
					<th>Email</th>
					<th>Activo</th>
					<th>Acciones</th>

				</tr>

			</thead>

			<tbody>

				<tr th:each="u : ${lista_usuario}">

					<td th:text="${u.codUsuario}"></td>

					<td th:text="${u.nombreRol}"><

					<td th:text="${u.nombre}"></td>

					<td th:text="${u.apellido}"></td>

					<td th:text="${u.email}"></td>

					<td th:text="${u.activo ? 'Sí' : 'No'}"></td>

					<td><a class="btn btn-warning btn-sm"
						th:href="@{'/usuario/modificar/' + ${u.codUsuario}}"> Editar </a>

						<a class="btn btn-danger btn-sm"
						th:href="@{'/usuario/eliminar/' + ${u.codUsuario}}"
						onclick="return confirmarEliminacion();"> Eliminar </a></td>

				</tr>

			</tbody>

		</table>

	</div>

	<script th:src="@{/js/sidebar.js}"></script>

</body>
</html>
