<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<title>Catálogo de Productos</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

</head>

<body class="container mt-4">

	<h2 class="text-center mb-4">Productos Disponibles</h2>

	<div class="row">

		<div class="col-md-4 mb-4" th:each="p : ${lista_producto}">

			<div class="card shadow h-100">

				<div class="card-body">

					<h4 class="card-title" th:text="${p.nomMarca}"></h4>

					<p>

						<b>Precio:</b> S/. <span th:text="${p.precio}"></span>

					</p>

					<p>

						<b>Tamaño:</b> <span th:text="${p.tamano}"></span>

					</p>

					<div class="d-grid">

						<a class="btn btn-success" href="#"> Seleccionar </a>

					</div>

				</div>

			</div>

		</div>

	</div>

</body>
</html>
